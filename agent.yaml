# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: foundry-data-analyst-with-skills
description: |
  Data analyst sandbox + Foundry Skills. On startup the agent enumerates skills
  registered on the Foundry project, unzips each into /opt/skills/<name>/,
  prepends bin/ to PATH, and appends SKILL.md to the system prompt so the LLM
  knows what playbooks (eda, ab-test, time-series, ...) are available.
protocols:
  - protocol: responses
    version: v1
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  - name: PROJECT_ENDPOINT
    value: ${AZURE_AI_PROJECT_ENDPOINT}
  - name: MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: WORKDIR
    value: /work
